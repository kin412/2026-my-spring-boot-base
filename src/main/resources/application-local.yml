spring:
  datasource:
    url: jdbc:h2:tcp://localhost/~/my_db
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    properties:
      hibernate:
        default_batch_fetch_size: 100

  # 타임리프 캐시 끄기 (운영 시에는 true로 바꿔야 함)
  thymeleaf:
    cache: false

  # 정적 리소스(CSS, JS) 캐시 끄기
  web:
    resources:
      chain:
        cache: false

    #local p6spy
    p6spy:
      enable-logging: true
      # 쿼리 로그 출력 형식 지정 (기본값 외에 사용자 정의 가능)
      logging: slf4j
      multiline: true # 쿼리를 한 줄로 보지 않고 예쁘게 여러 줄로 보여줌

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

file:
  dir: C:/fileTestDir/ # 반드시 마지막에 /를 붙이기

#swagger - 스웨거 역시도 운영에서는 막아둬야함.
springdoc:
  #packages-to-scan: com.kin.base.domain.board.controller
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  swagger-ui:
    path: /swagger-ui.html      # 접속 경로: localhost:8080/swagger-ui.html
    groups-order: DESC
    operationsSorter: method    # HTTP 메서드 순으로 정렬 (GET, POST 등)
    display-request-duration: true
  api-docs:
    path: /api-docs