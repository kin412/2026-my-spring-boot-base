<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <meta charset="UTF-8">
    <title th:text="${formMode == 'new'} ? '새글쓰기' : '글 수정'">새글쓰기</title>
</head>
<body class="container mt-5">
    <div><h2 class="mb-5" th:text="${formMode == 'new'} ? '새글쓰기' : '글 수정'">새글쓰기</h2></div>

    <form th:action="${formMode == 'new'} ? @{/board/save} : @{/board/update/id(id=${board.id})}"
          th:object="${board}" method="post" enctype="multipart/form-data">

        <div class="row g-0 border">
            <div class="col-8 border-end p-2 bg-light text-center fw-bold">제목</div>
            <div class="col-4 p-2 bg-light text-center fw-bold">작성자</div>
        </div>

        <div class="row g-0 border border-top-0">
            <div class="col-8 border-end p-2">
                <input type="text"
                       class="form-control"
                       th:field="*{title}"
                       placeholder="제목을 입력하세요">
                <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" style="color:red;"></p>
            </div>

            <div class="col-4 p-2 text-center">
                <input type="text"
                       class="form-control text-center"
                       th:field="*{author}"
                       th:readonly="*{author != null}"
                       placeholder="작성자">
                <p th:if="${#fields.hasErrors('author')}" th:errors="*{author}" style="color:red;"></p>
            </div>
        </div>

        <div class="row g-0 border border-top-0">
            <div class="col-3 border-end p-2 bg-light text-center fw-bold d-flex align-items-center justify-content-center">
                내용
            </div>
            <div class="col-9 p-2">
            <textarea class="form-control border-0"
                      rows="15"
                      style="resize: none; min-height: 300px;"
                      th:field="*{content}"
                      placeholder="내용을 입력하세요"></textarea>
                <p th:if="${#fields.hasErrors('content')}" th:errors="*{content}" style="color:red;"></p>
            </div>
        </div>

        <div class="row g-0 border border-top-0">
            <div class="col-3 border-end p-2 bg-light text-center fw-bold d-flex align-items-center justify-content-center">
                첨부파일
            </div>

            <div class="col-9 p-3">

                <div th:if="${formMode == 'update' && !board.fileList.isEmpty()}" class="mb-3">
                    <p class="fw-bold mb-1">기존 파일:</p>
                    <ul class="list-unstyled">
                        <li th:each="file : ${board.fileList}" th:id="'file-row-' + ${file.id}" class="mb-2">
                            <span th:text="${file.originName}">파일명.jpg</span>

                            <button type="button"
                                    class="btn btn-sm btn-outline-danger ms-2"
                                    th:data-id="${file.id}"
                                    onclick="addDeleteFile(this)">
                                삭제
                            </button>
                        </li>
                    </ul>
                    <div id="delete-file-ids-container"></div>
                </div>

                <input type="file"
                                           name="boardFiles"
                                           id="boardFiles"
                                           class="form-control"
                                           multiple
                                           style="display: block !important; opacity: 1 !important;">
                <div class="form-text mt-1">최대 3개까지 업로드 가능합니다.</div>
            </div>
        </div>

        <div class="btn-container d-flex justify-content-end mt-4">
            <button type="submit" class="btn btn-primary px-4">저장</button>
            <button type="button" class="btn btn-secondary ml-3" th:onclick="|location.href='/board/boardList'|">취소</button>
        </div>

    </form>


    <!-- 기본은 읽기,쓰기,수정 - 동기, 삭제 - 비동기  -->

    <!-- 자바스크립트 파일이 큰경우는 브라우저가 먼저읽어버리면 화면이 늦게떠서 이런식으로쓴다함  -->
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>

    <script>

        // Fetch API
        async function addDeleteFile(button) {

            if (!confirm("정말로 삭제하시겠습니까?")) return;

            let fileId = button.dataset.id;
            const row = document.getElementById('file-row-' + fileId); // 지울 <li> 태그 찾기
            if (row) row.remove();

            // 서버로 넘길 hidden input 생성
            const container = document.getElementById('delete-file-ids-container');
            const input = document.createElement('input');

            input.type = 'hidden';
            input.name = 'deleteFileIds';
            input.value = fileId;

            container.appendChild(input);

            /*try {
                const response = await fetch("/board/deleteFile/" + fileId, {
                    method: "DELETE"
                });

                if (response.ok) {
                    //alert("파일이 삭제되었습니다.");

                    if (row) {
                        row.remove();
                    }

                } else {
                    alert("파일 삭제 실패!");
                }
            } catch (error) {
                console.error("에러 발생:", error);
            }*/
        }

        document.addEventListener("DOMContentLoaded", function() {
            const form = document.querySelector('form'); // 또는 id가 있다면 #boardForm

            form.addEventListener('submit', function(e) {
                // 1. 값 가져오기 (th:field로 생성된 id 사용)
                const title = document.getElementById('title').value.trim();
                const author = document.getElementById('author').value.trim();
                const content = document.getElementById('content').value.trim();

                // 2. 제목 체크
                if (!title) {
                    alert('제목을 입력해주세요!');
                    document.getElementById('title').focus();
                    e.preventDefault(); // 서버 전송 중단
                    return false;
                }

                // 3. 작성자 체크
                if (!author) {
                    alert('작성자를 입력해주세요!');
                    document.getElementById('author').focus();
                    e.preventDefault();
                    return false;
                }

                // 4. 내용 체크
                if (!content) {
                    alert('내용을 입력해주세요!');
                    document.getElementById('content').focus();
                    e.preventDefault();
                    return false;
                }

                // 5. 파일 개수 체크 추가
                const fileInput = document.getElementById('boardFiles');
                const files = fileInput.files;

                if (files.length > 3) {
                    alert('첨부파일은 최대 3개까지만 업로드 가능합니다.');
                    fileInput.focus();
                    e.preventDefault(); // 서버 전송 중단
                    return false;
                }

            });
        });

        //bindingresult 적용후 부터 안됨
        // 페이지가 캐시에서 로드되었는지 확인 (뒤로가기 체크)
        window.onpageshow = function(event) {
            if (event.persisted) {
                // 뒤로가기로 왔다면 새로고침하거나 목록으로 튕겨버림
                location.href = "/";

                //reload해서 폼만 초기화
                //location.reload();
            }
        };
    </script>

</body>
</html>
