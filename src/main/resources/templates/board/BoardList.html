<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <meta charset="UTF-8">
    <title>게시판</title>
</head>
<body class="container mt-5">
<h2 class="mb-5">게시판</h2>

<div th:if="${member != null}">
    <span th:text="${member.loginId}" class="fw-bold text-primary"></span>님 반갑습니다.
    <form th:action="@{/logout}" method="post" style="margin: 0;">
        <button type="submit" class="btn btn-outline-danger btn-sm">로그아웃</button>
    </form>
</div>
<div th:unless="${member != null}">
    <span class="text-muted">[로그인 정보없음]</span>
    <a th:href="@{/}" class="btn btn-outline-primary btn-sm">로그인</a>
</div>
<div class="d-flex justify-content-between align-items-center mb-3">
    <div>
        총 <span th:text="${boardList.totalElements}" class="fw-bold text-primary">0</span>건
    </div>
    <div class="d-flex">
        <button th:if="${member != null && member.loginId == 'admin'}" type="button"
                class="btn btn-danger" th:onclick="adminSelectDel()">선택한 글 삭제</button>
        <button type="button" class="btn btn-primary ml-2" th:onclick="|location.href='@{/board/new}'|">새글쓰기</button>
    </div>
</div>

<div class="card mb-4 bg-light">
    <div class="card-body">
        <form th:action="@{/board/boardList}" method="get" class="row g-3">
            <div class="col-md-3">
                <input type="text" name="title" class="form-control" placeholder="제목 검색" th:value="${param.title}">
            </div>
            <div class="col-md-3">
                <input type="text" name="author" class="form-control" placeholder="작성자 검색" th:value="${param.author}">
            </div>
            <div class="col-md-4">
                <div class="input-group">
                    <span class="input-group-text">작성일</span>
                    <input type="date" name="createdDate" class="form-control" th:value="${param.createdDate}">
                </div>
            </div>
            <div class="col-md-2 d-grid">
                <button type="submit" class="btn btn-primary">검색</button>
                <a th:href="@{/board/boardList}" class="btn btn-outline-secondary">초기화</a>
            </div>
        </form>
    </div>
</div>

<table class="table table-hover">
    <thead class="table-light">
    <tr>
        <th th:if="${member != null && member.loginId == 'admin'}"><input type="checkbox" id="allCheck"></th>
        <th>글번호</th>
        <th>제목</th>
        <th>작성자</th>
        <th>작성일</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="board : ${boardList.content}">
        <td th:if="${member != null && member.loginId == 'admin'}">
            <input type="checkbox" name="selectedBoardIds" th:value="${board.id}" class="board-checkbox">
        </td>
        <td th:text="${board.id}"/>
        <td>
            <a th:href="@{/board/{id}(id=${board.id})}" th:text="${board.title}">default title</a>
        </td>
        <td th:text="${board.author}"/>
        <td th:text="${board.createdDate}"/>
    </tr>
    </tbody>
</table>

<div th:if="${boardList.totalElements == 0}" class="text-center py-5 text-muted">
    <h4 class="fw-light">조회 결과가 없습니다.</h4>
</div>

<nav th:if="${!boardList.isEmpty()}" aria-label="Page navigation"
     th:with="
        current = ${boardList.number + 1},
        pageSize = 5,
        totalPages = ${boardList.totalPages},
        start = ${(current - 1) / pageSize * pageSize + 1},
        tempEnd = ${start + pageSize - 1},
        end = ${tempEnd > totalPages ? totalPages : tempEnd},

        sTitle = ${param.title ?: ''},
        sAuthor = ${param.author ?: ''},
        sDate = ${param.createdDate ?: ''}
     ">
    <ul class="pagination justify-content-center">

        <li class="page-item" th:classappend="${start == 1} ? 'disabled'">
            <a class="page-link"
               th:href="@{/board/boardList(page=${start - 2}, title=${sTitle}, author=${sAuthor}, createdDate=${sDate})}">이전</a>
        </li>

        <li th:each="page: ${#numbers.sequence(start, end)}"
            th:classappend="${page == current} ? 'active'" class="page-item">
            <a class="page-link"
               th:href="@{/board/boardList(page=${page - 1}, title=${sTitle}, author=${sAuthor}, createdDate=${sDate})}"
               th:text="${page}"></a>
        </li>

        <li class="page-item" th:classappend="${end == totalPages} ? 'disabled'">
            <a class="page-link"
               th:href="@{/board/boardList(page=${end}, title=${sTitle}, author=${sAuthor}, createdDate=${sDate})}">다음</a>
        </li>

    </ul>
</nav>

<!-- 기본은 읽기,쓰기,수정 - 동기, 삭제 - 비동기  -->

<!-- 자바스크립트 파일이 큰경우는 브라우저가 먼저읽어버리면 화면이 늦게떠서 이런식으로쓴다함  -->
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>

<script th:inline="javascript">
    const msg = [[${errorMessage}]];
    if (msg) {
        alert(msg); // 브라우저 기본 팝업
    }

    const allCheck = document.getElementById("allCheck");
    const boardCheckboxes = document.querySelectorAll('.board-checkbox')

    allCheck.addEventListener('change', function(){
        const isChecked = allCheck.checked;

        boardCheckboxes.forEach(checkbox => {
           checkbox.checked = isChecked;
        });
    });

    boardCheckboxes.forEach(checkbox => {
        checkbox.addEventListener('change', function() {
            // 체크된 박스 개수와 전체 박스 개수를 비교
            const checkedCount = document.querySelectorAll('.board-checkbox:checked').length;
            const totalCount = boardCheckboxes.length;

            // 모두 체크되어 있다면 전체 선택 박스도 체크, 하나라도 비어있으면 해제
            allCheck.checked = (checkedCount === totalCount);
        });
    });

    // Fetch API
    async function adminSelectDel() {

        const checkeBoxes = document.querySelectorAll('.board-checkbox:checked');

        if (checkeBoxes.length === 0) {
            alert("삭제할 게시글을 선택해주세요.");
            return;
        }

        if (!confirm("정말로 삭제하시겠습니까?")) return;

        // 체크된 요소들의 value(ID)만 뽑아서 배열로 만들기
        const selectedIds = Array.from(checkeBoxes).map(box => box.value);

        try {
            const response = await fetch("/api/v1/boards/adminSelectDel", {
                method: "DELETE",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(selectedIds)
            });

            if (response.ok) {
                alert("삭제되었습니다.");
                //location.reload(); // 성공 시 새로고침
                //location.href = "/"; // 뒤로가기 하면 캐시때문에 삭제전 글이 보임
                location.replace("/board/boardList");
            } else {
                const errMsg = await response.text();
                alert("삭제 실패!");
                console.log("errMsg : " + errMsg);
            }
        } catch (error) {
            console.error("에러 발생:", error);
            alert("네트워크 오류가 발생했습니다.");
        }
    }

</script>

<script>

</script>

</body>
</html>
